title: "Model\nCheck"

tooltip: |
  🇬🇧 [EN] Comprehensive Revit model audit tool for QA/QC and pre-submission validation.
  Key Features:
  • Warning Management: Categories warnings by description with clickable Element ID links.
  • Data Integrity: Identifies duplicate 'Mark' parameter values across all categories.
  • Cleanup Audit: Finds unused Families, Views (not on sheets), and empty Worksets.
  • Performance Check: Audits file size, group counts, view counts, and total element counts.
  • Health Score: Calculates a 0-100 score and generates a stylized HTML report with recommendations.

  🇹🇭 [TH] เครื่องมือตรวจสอบสุขภาพโมเดล Revit เชิงลึกสำหรับงาน QA/QC และการตรวจสอบก่อนส่งงาน
  ฟังก์ชันหลัก:
  • จัดการ Warnings: แยกหมวดหมู่ข้อผิดพลาด พร้อมลิงก์คลิกเพื่อดูชิ้นงานที่มีปัญหาได้ทันที
  • ความถูกต้องของข้อมูล: ค้นหาค่า 'Mark' ที่ซ้ำกันในโครงการ
  • ตรวจสอบส่วนเกิน: ค้นหา Families, Views (ที่ไม่ได้วางบน Sheet) และ Worksets ที่ไม่มีชิ้นงาน
  • ตรวจสอบประสิทธิภาพ: วิเคราะห์ขนาดไฟล์, จำนวนกลุ่ม (Groups), จำนวน View และจำนวนวัตถุทั้งหมด
  • คะแนนสุขภาพ (Health Score): คำนวณคะแนน 0-100 พร้อมรายงานผลรูปแบบ HTML และคำแนะนำการแก้ไข

author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "Comprehensive model health check for QA/QC with health scoring and performance audit. / ตรวจสอบสุขภาพโมเดล QA/QC พร้อมระบบคำนวณคะแนนและวิเคราะห์ประสิทธิภาพ"