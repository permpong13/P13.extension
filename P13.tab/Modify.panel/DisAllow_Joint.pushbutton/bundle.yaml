title: "DisAllow\nBeam-Joint"

tooltip: |
  เครื่องมือนี้ใช้สำหรับปิดการ Join ของ Beam / Brace โดยเลือกได้ว่าจะปิดที่ด้าน Start หรือ End  
  เหมาะสำหรับผู้ใช้งานที่ต้องการควบคุมรูปทรงของคานหรือเหล็กโครงสร้างไม่ให้ Revit ทำการ Join อัตโนมัติ
    ฟังก์ชันหลัก:
    • เลือกได้ว่าจะ Disallow Join ที่หัว (Start)
    • เลือกได้ว่าจะ Disallow Join ที่ท้าย (End)
    • ทำงานเฉพาะกับ Structural Framing เช่น Beam, Brace
    • รายงานจำนวนที่ปิด Join สำเร็จ
    • รองรับการทำงานแบบหลายตัวพร้อมกัน (Multi-Selection)
    การใช้งาน:
    1. เลือก Beam หรือ Brace ในโมเดล
    2. รันสคริปต์
    3. ระบบจะถาม:
         - ต้องการ Disallow ที่หัว (Start) ไหม?
         - ต้องการ Disallow ที่ท้าย (End) ไหม?
    4. ระบบจะปิด Join ตามตัวเลือกของผู้ใช้


author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "Disallow beam/brace join at Start/End points with multi-selection support."

