title: "Sync to Update"

tooltip: |
  เครื่องมือสำหรับอัปเดตชุดคำสั่ง BIM (P13 Extension)
  ให้เป็นเวอร์ชันล่าสุดจากเซิร์ฟเวอร์ส่วนกลาง
    ฟังก์ชันหลัก:
    • ตรวจสอบเวอร์ชันใหม่จากเครื่องหลัก (\\tee)
    • ดึงข้อมูลเฉพาะไฟล์ที่มีการเปลี่ยนแปลง (Sync)
    • ระบบป้องกันการทับไฟล์งานของเจ้าของเครื่อง (Permpong13)
    • รีโหลดแถบเครื่องมืออัตโนมัติหลังอัปเดตเสร็จ
    
    หมายเหตุ: กรุณาเชื่อมต่อวง LAN ของออฟฟิศก่อนใช้งาน

author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "Sync and update BIM tools from the central server to the local machine."