title: "Rotete\nFitting"

tooltip: |
    - รองรับ Pipe, Duct, Fittings, Accessories และ Equipment
    - เลือกทิศทางได้ทั้ง 90° และ 45° (Up, Down, Left, Right)
    - Multi-Port: เลือกต่อท่อออกจากหลายรูพร้อมกันได้ (เช่น ถังน้ำ)
    - Auto System: ค้นหา System Type ให้อัตโนมัติกรณีเริ่มเดินท่อใหม่
    - Remember: จดจำค่าความยาวล่าสุดที่ใช้งาน
    How to use:
    1. เลือกวัตถุที่ต้องการต่อท่อ (เลือกชิ้นเดียว)
    2. กดปุ่มคำสั่ง
    3. หากมีหลายรู ให้เลือกรูที่ต้องการ (เลือกได้มากกว่า 1)
    4. เลือกทิศทางและความยาว

author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "เครื่องมือสำหรับ Rotete Fitting"

