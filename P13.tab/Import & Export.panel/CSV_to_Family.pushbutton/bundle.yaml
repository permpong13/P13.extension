title: "Detail Items\nfrom CSV"

tooltip: |
  🇬🇧 [EN] Import CSV coordinates to automatically place Detail Items in Plan Views (Revit 2026 Compatible).
  Key Features:
  • Auto-detects Project Base Point (PBP) and True North Angle, with a UI to verify or edit values.
  • Precisely transforms Survey Coordinates (E/N in meters) to Revit internal coordinates.
  • Remembers the last used folder path for quick CSV selection.
  • Sets parameters for generated items: Mark, Comments, Survey_E, and Survey_N.
  • Fallback option to draw simple geometry if no Detail Item families are found.

  🇹🇭 [TH] นำเข้าพิกัดจากไฟล์ CSV เพื่อสร้าง Detail Items บน Plan View อัตโนมัติ (รองรับ Revit 2026)
  ฟังก์ชันหลัก:
  • ดึงค่า Project Base Point (PBP) และมุม True North ให้อัตโนมัติ พร้อมหน้าต่างตรวจสอบและแก้ไขค่า
  • แปลงพิกัด Survey (E/N หน่วยเมตร) เป็นพิกัดของ Revit อย่างแม่นยำ (คำนึงถึง Base Point Offset)
  • ระบบจดจำโฟลเดอร์ล่าสุดที่เลือกไฟล์ CSV เพื่อความรวดเร็วในการใช้งาน
  • อัปเดตพารามิเตอร์อัตโนมัติ: Mark, Comments, Survey_E, และ Survey_N
  • หากไม่มี Detail Item Family โหลดไว้ ระบบมีตัวเลือกสร้างเป็นเส้นเรขาคณิต (Simple Geometry) แทนได้

author: "เพิ่มพงษ์ ทวีกุล | P13"
description: "Import CSV coordinates to place detail items automatically. / นำเข้าพิกัด CSV เพื่อสร้างและวาง Detail Items อัตโนมัติอ้างอิงจาก PBP"