title: "DisAllow\nBeam-Joint"

tooltip: |
  เครื่องมือสำหรับปิดการเชื่อมต่อ (Disallow Join) หัว-ท้ายของ Beam และ Brace แบบอัตโนมัติ

  [ENG]
  - Interactive Prompts: Choose to disallow join at the Start point, End point, or both.
  - Smart Filtering: Automatically filters and processes only Structural Framing elements (Beams/Braces) from your active selection.
  - Batch Processing: Select multiple framing elements and apply the disallow join command simultaneously.
  - Progress Tracking: Provides a summary report on the number of elements successfully updated.

  [TH]
  - ตัวเลือกตอบโต้ (Interactive Prompts): เลือกระบุได้ว่าจะปิดการ Join ที่ฝั่งหัว (Start), ฝั่งท้าย (End) หรือทั้งสองฝั่ง
  - กรองชิ้นงานอัจฉริยะ (Smart Filtering): กรองและทำงานเฉพาะชิ้นงานหมวด Structural Framing (คาน และ ค้ำยัน) จากรายการที่เลือก
  - การทำงานแบบกลุ่ม (Batch Processing): รองรับการเลือกชิ้นงานหลายตัวพร้อมกัน เพื่อสั่ง Disallow Join ในครั้งเดียว
  - สรุปผลการทำงาน (Progress Tracking): แจ้งเตือนและสรุปจำนวนชิ้นงานทั้งหมดที่ดำเนินการปิด Join สำเร็จ

author: "เพิ่มพงษ์ ทวีกุล (P13)"

description: "Disallow structural framing (beam/brace) joints at Start/End points with multi-selection support. / เครื่องมือปิดการ Join หัว-ท้ายของคานและค้ำยัน"