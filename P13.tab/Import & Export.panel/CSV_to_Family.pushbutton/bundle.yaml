title: "Import Family\nfrom CSV"

tooltip: |
  เครื่องมือนำเข้าและวางตำแหน่งเสาเข็มอัตโนมัติจากไฟล์ CSV 
  พร้อมระบบปลดล็อคการเลือกพารามิเตอร์และแปลงพิกัด Survey (E/N)

  [ENG]
  - Precise Coordinate Mapping: Converts Survey Coordinates (E/N in meters) to Revit internal units, considering Project Base Point (PBP) and True North rotation.
  - Full Parameter Unlocked: Dynamically scans and allows you to choose any available parameter (Instance, Type, or Built-in) to write the pile number/ID.
  - Smart Type Matching: Automatically matches and activates family types based on names in the CSV file, with a fallback to a default selected type.
  - Elevation & Cut-off Control: Supports "Cut-off" level or elevation data from CSV, automatically calculating and applying offsets relative to the host level.
  - Multi-Category Support: Processes Structural Columns and Structural Foundations with automatic Structural Type assignment.

  [TH]
  - แปลงพิกัดแม่นยำ: แปลงค่าพิกัด Survey (E/N หน่วยเมตร) เป็นพิกัด Revit โดยอ้างอิงจาก Project Base Point (PBP) และมุมทิศเหนือจริง (True North) อย่างถูกต้อง
  - ปลดล็อคพารามิเตอร์: ระบบสแกนหาพารามิเตอร์ทั้งหมดในชิ้นงาน (Instance, Type, Shared) เพื่อให้คุณเลือกบันทึกเลข No/Mark ลงในพารามิเตอร์ตัวไหนก็ได้
  - จับคู่ประเภทอัจฉริยะ: ค้นหาและจับคู่ Family Type อัตโนมัติจากชื่อที่ระบุใน CSV พร้อมระบบ Activate Symbol ก่อนวางชิ้นงาน
  - ควบคุมระดับความสูง (Cut-off): รองรับข้อมูลระดับความสูงหรือค่า Cut-off จาก CSV โดยระบบจะคำนวณและตั้งค่า Offset สัมพันธ์กับ Level ที่เลือกให้ทันที
  - รองรับหลายหมวดหมู่: ทำงานได้ทั้งหมวดเสา (Structural Column) และฐานราก (Structural Foundation) พร้อมกำหนดค่าโครงสร้างให้อัตโนมัติ

author: "เพิ่มพงษ์ ทวีกุล (P13)"

description: "Import piles from CSV with E/N coordinate transformation, dynamic parameter mapping, and auto-type matching. / นำเข้าเสาเข็มจาก CSV พร้อมระบบแปลงพิกัดและเลือกพารามิเตอร์อิสระ"