title: "Families\nfrom CSV"

tooltip: |
  เครื่องมือนำเข้าและวางตำแหน่ง Families อัตโนมัติจากไฟล์ CSV 
  พร้อมระบบปลดล็อคการเลือกพารามิเตอร์และแปลงพิกัด Survey (E/N)

  [ENG]
  - Precise Coordinate Mapping: Converts Survey Coordinates (E/N in meters) to Revit internal units, considering Project Base Point (PBP) and True North.
  - Full Parameter Unlocked: Dynamically scans and allows you to choose any available parameter (Instance, Type, or Built-in) to write the pile number/ID.
  - Smart Type Matching: Automatically matches and activates family types based on names in the CSV file, with a fallback to a default type.
  - Elevation & Cut-off Control: Supports "Cut-off" level or elevation data from CSV, automatically calculating and applying offsets relative to the host level.
  - macOS-Style UI: Clean, user-friendly interface with a built-in 1-click sample CSV file opener.

  [TH]
  - แปลงพิกัดแม่นยำ: แปลงค่าพิกัด Survey (E/N หน่วยเมตร) เป็นพิกัด Revit โดยอ้างอิงจาก Project Base Point (PBP) และ True North อย่างถูกต้อง
  - ปลดล็อคพารามิเตอร์: สแกนหาพารามิเตอร์ทั้งหมดในชิ้นงาน เพื่อให้คุณเลือกบันทึกเลข No/Mark ลงในพารามิเตอร์ตัวไหนก็ได้
  - จับคู่ประเภทอัจฉริยะ: ค้นหาและจับคู่ Families Type อัตโนมัติจากชื่อที่ระบุใน CSV พร้อมระบบ Activate ก่อนวางชิ้นงาน
  - ควบคุมระดับความสูง (Cut-off): รองรับข้อมูล Cut-off จาก CSV โดยระบบจะคำนวณและตั้งค่า Offset สัมพันธ์กับ Level ที่เลือกให้ทันที
  - หน้าตาใช้งานง่าย: UI สไตล์ macOS ที่ดูคลีนสะอาดตา พร้อมปุ่มเปิดไฟล์ CSV ตัวอย่างในตัว

author: "เพิ่มพงษ์ ทวีกุล (P13)"

description: "Import Families from CSV with E/N coordinate transformation, dynamic parameter mapping, auto-type matching, and macOS-style UI. / นำเข้า Families จาก CSV พร้อมระบบแปลงพิกัด เลือกพารามิเตอร์อิสระ และหน้าต่าง UI สไตล์ macOS"