title: "ImportCAD\nManager"

tooltip: |
  🇬🇧 [EN] Manage, locate, explode, or delete CAD Imports across the project (Revit 2025/2026 Compatible).
  Key Features:
  • Real-time search and filter by CAD Name, View Name, or File Path.
  • Double-click an item to instantly open the View containing that CAD.
  • Batch operations: Explode or Delete selected items, or apply to All at once.
  • User-friendly DataGrid UI with progress tracking and instant refresh.

  🇹🇭 [TH] จัดการ ค้นหา ระเบิด (Explode) หรือลบไฟล์ CAD ที่นำเข้ามาในโปรเจกต์ (รองรับ Revit 2025/2026)
  ฟังก์ชันหลัก:
  • ระบบค้นหาและกรองข้อมูลแบบ Real-time ด้วยชื่อ CAD, ชื่อ View หรือ Path ของไฟล์
  • ดับเบิลคลิกที่รายการเพื่อเปิดไปยัง View ที่มี CAD ชิ้นนั้นอยู่ทันที (Jump to View)
  • การทำงานแบบกลุ่ม: เลือก Explode หรือ Delete เฉพาะรายการที่เลือก หรือทำทั้งหมดพร้อมกันได้
  • หน้าต่าง UI แบบ DataGrid ใช้งานง่าย รวดเร็ว พร้อมแถบแสดงความคืบหน้า (Progress bar)

author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "Manage, filter, explode, and delete CAD imports through a DataGrid UI. / จัดการ ค้นหา ระเบิด และลบ CAD Imports อย่างรวดเร็ว"