tooltip: |
  Spectrum: เครื่องมือระบายสีและวิเคราะห์โมเดลขั้นสูง (Advanced Themes & Transparency Edition) 
  ช่วยให้การพรีเซนต์งานและตรวจสอบค่าพารามิเตอร์ใน Revit เป็นเรื่องง่ายและสวยงาม (รองรับ Revit 2026)

  [ENG]
  - macOS-Inspired Interface: Modern, clean, and intuitive UI with rounded corners and professional aesthetics.
  - Advanced Color Themes: Apply predefined palettes like Pastel, Vibrant, Dark, or Earthy with a single click.
  - Transparency Control: Real-time surface transparency adjustment (0-100%) for better visualization of MEP and Architectural systems.
  - Smart Export & Memory: Supports both .cschn and .csv formats. The tool automatically remembers your last used folder path.
  - Element Interaction: Shift+Click to instantly select elements in Revit. Create Legends or View Filters directly from your color schemes.

  [TH]
  - หน้าจอแบบ macOS (macOS-Inspired): ดีไซน์ทันสมัย สะอาดตา ด้วยขอบโค้งมนและ UI ที่ใช้งานง่าย
  - ชุดสีสำเร็จรูป (Advanced Themes): เลือกใช้โทนสีระดับมืออาชีพ เช่น Pastel, Vibrant, Dark หรือ Earthy ได้ทันที
  - ควบคุมความโปร่งใส (Transparency Control): ปรับค่าความโปร่งใสของวัตถุ (0-100%) แบบเรียลไทม์ เพื่อช่วยในการตรวจสอบงานระบบหรือพรีเซนต์งาน
  - ระบบบันทึกอัจฉริยะ (Smart Export & Memory): รองรับทั้งไฟล์ .cschn และ .csv พร้อมระบบจดจำ Folder Path ล่าสุดอัตโนมัติ (ไม่ต้องเลือกใหม่ทุกครั้ง)
  - การจัดการข้อมูล: ใช้ Shift+Click เพื่อเลือกวัตถุในโมเดลทันที และรองรับการสร้าง Legend หรือ View Filters จากชุดสีที่ตั้งไว้

