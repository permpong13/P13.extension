title: "CopyLegend\nto Sheets"

tooltip: |
  เครื่องมือจัดการ Legend บน Sheet (Sync Position)
  ช่วยในการคัดลอกและจัดวาง Legend ให้ตรงตำแหน่งเดียวกันในหลายๆ Sheet
    ฟังก์ชันหลัก:
    • คัดลอก Legend จาก Sheet ต้นแบบไปยัง Sheet ปลายทางที่เลือก
    • หากมี Legend นั้นอยู่แล้ว ระบบจะปรับตำแหน่ง (Box Center) ให้ตรงกับต้นฉบับ
    • อัปเดตประเภท View Title ให้ตรงตามต้นฉบับอัตโนมัติ
    • รองรับการเลือก Legend และ Sheet ปลายทางได้ครั้งละหลายรายการ
  
    วิธีใช้งาน:
    1. เปิดหน้า Sheet ที่มี Legend ต้นแบบที่ต้องการ
    2. รันคำสั่งนี้ และเลือก Legend ที่ต้องการ Sync
    3. เลือก Sheet ปลายทางที่ต้องการส่ง Legend ไปวาง

author: "เพิ่มพงษ์ ทวีกุล | P13"
description: "คัดลอกและอัปเดตตำแหน่ง Legend บน Sheet ให้ตรงกันอัตโนมัติ"