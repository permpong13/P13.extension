title: "F-Corner\nCoordinates"

tooltip: |
  เครื่องมือสร้างพิกัดมุมฐานราก (Northing/Easting) อัตโนมัติ 
  พร้อมระบบ Smart Offset และเส้น Leader ทำมุม 45 องศา

  [ENG]
  - Coordinate Calculation: Computes N/E coordinates in meters based on the Project Base Point, including rotation and offset adjustments.
  - Smart Corner Detection: Uses the Convex Hull algorithm to automatically identify the outer corners of any foundation shape.
  - 45° Geometric Leaders: Generates leader lines that maintain a clean 45-degree angle from the corner to the text center.
  - Overlap Prevention (Smart Offset): Automatically detects and shifts TextNotes if they are too close to each other to ensure readability.
  - Auto-Formatting: Sets coordinates to 3 decimal places, adjusts text size to 2mm, and handles horizontal alignment based on corner position.
  - Foundation Filtering: Processes structural foundations while intelligently excluding elements labeled as "PILE".

  [TH]
  - คำนวณพิกัดแม่นยำ: คำนวณค่า Northing/Easting ในหน่วยเมตร อ้างอิงจาก Project Base Point พร้อมรองรับการหมุน (Rotation) และค่า Offset ของโปรเจกต์
  - ตรวจจับมุมอัจฉริยะ: ใช้ระบบ Convex Hull เพื่อหาจุดมุมนอกสุดของฐานรากรูปทรงต่างๆ โดยอัตโนมัติ
  - เส้นชี้ Leader 45 องศา: สร้างเส้น Leader โยงจากมุมฐานรากไปยังข้อความ โดยรักษามุม 45 องศาเพื่อความสวยงามและเป็นระเบียบ
  - ระบบกันข้อความทับกัน (Smart Offset): ตรวจสอบตำแหน่งข้อความที่อาจวางซ้อนกัน และขยับตำแหน่งให้อัตโนมัติเพื่อให้พิกัดทุกจุดอ่านง่าย
  - จัดรูปแบบอัตโนมัติ: แสดงผลทศนิยม 3 ตำแหน่ง, ตั้งค่าขนาดตัวอักษรที่ 2 มม. และจัดชิดซ้าย/ขวาตามตำแหน่งของมุม
  - ตัวกรองฐานราก: ทำงานเฉพาะกับฐานรากโครงสร้าง (Structural Foundation) โดยข้ามชิ้นงานที่เป็นเสาเข็ม (Pile) อัตโนมัติ

author: "เพิ่มพงษ์ ทวีกุล (P13)"

description: "Auto-generate foundation corner N/E coordinates with 45° leaders and smart overlap prevention. / สร้างพิกัดมุมฐานรากอัตโนมัติพร้อมระบบกันข้อความทับกัน"