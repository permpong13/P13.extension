title: "Pipe\nAutoTag"

tooltip: |
  🇬🇧 [EN] Automated Pipe Tagging for the active view with smart layout logic.
  Key Features:
  • Multiple Selection Modes: Tag All, Visible Only, Manual Pick, or Select from List (includes diameter info).
  • Scale-Aware Spacing: Automatically adjusts tag distance, row spacing, and leader lengths based on View Scale.
  • Smart Placement: Features automatic grouping, row alignment, and collision avoidance (Auto-split tiers).
  • Leader Management: Creates tags with Free-end leaders pointed accurately to pipe centers.
  • Avoid Duplicates: Scans for existing tags before creation to prevent redundant tagging.
  • Multi-View Support: Compatible with Plan, Section, Elevation, and 3D views.

  🇹🇭 [TH] ระบบสร้าง Pipe Tag อัตโนมัติในมุมมองปัจจุบัน พร้อมระบบจัดวางอัจฉริยะ
  ฟังก์ชันหลัก:
  • โหมดการเลือกที่หลากหลาย: ทั้งหมด, เฉพาะที่มองเห็น, เลือกเองบนจอ, หรือเลือกจากรายการ (พร้อมแสดงขนาดท่อ)
  • ปรับค่าตามมาตราส่วน: คำนวณระยะห่างแท็ก ระยะห่างแถว และความยาว Leader อัตโนมัติตาม Scale ของ View
  • การจัดวางอัจฉริยะ: ระบบจัดกลุ่ม, เรียงแถวตามแนวท่อ และป้องกันแท็กวางซ้อนกัน (Auto-split tiers)
  • จัดการ Leader: สร้างแท็กพร้อมเส้น Leader แบบ Free-end ชี้เข้าหาจุดกึ่งกลางท่ออย่างแม่นยำ
  • ระบบกันแท็กซ้ำ: ตรวจสอบ Tag เดิมที่มีอยู่แล้วในโปรเจกต์เพื่อหลีกเลี่ยงการสร้างซ้อน
  • รองรับหลายมุมมอง: ใช้งานได้ทั้งแปลน (Plan), รูปตัด (Section), รูปด้าน (Elevation) และ 3D View

author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "Automatic pipe tagging with smart grouping, scale-aware spacing, and collision-avoidance. / สร้าง Pipe Tag อัตโนมัติพร้อมระบบจัดกลุ่มและปรับระยะตามมาตราส่วน"