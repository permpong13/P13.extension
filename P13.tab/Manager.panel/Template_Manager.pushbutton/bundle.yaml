title: "Template\nManager"

tooltip: |
  🇬🇧 [EN] Ultimate View Template management and batch application tool (All-in-One).
  Key Features:
  • Usage Analysis & Dashboard: Scans all View Templates, separates Used from Unused, and displays instance counts.
  • Batch Operations: Bulk Rename (Prefix/Find & Replace) and Duplicate templates with custom suffixes.
  • Safe Cleanup: Preview and selectively delete unused templates to safely reduce file size.
  • Export to Excel (CSV): Generates usage reports and automatically remembers your chosen export folder (Prompts if no path is set).
  • Quick Apply: Quickly select and apply View Templates to multiple views simultaneously.

  🇹🇭 [TH] เครื่องมือจัดการและใช้งาน View Template ระดับโปรแบบ All-in-One
  ฟังก์ชันหลัก:
  • วิเคราะห์การใช้งาน (Dashboard): ตรวจสอบ View Template ทั้งหมด แยกรายการที่ถูกใช้งาน/ไม่ได้ใช้งาน พร้อมนับจำนวนอ้างอิง
  • จัดการแบบกลุ่ม (Batch Actions): เปลี่ยนชื่อพร้อมกัน (Prefix/Find & Replace) และคัดลอก (Duplicate) Template
  • ทำความสะอาดอย่างปลอดภัย: เลือกลบเฉพาะ Template ที่ไม่ได้ใช้งาน (Unused) เพื่อลดขนาดไฟล์โปรเจกต์
  • ส่งออกรายงาน (Export to Excel): บันทึกข้อมูลเป็น CSV พร้อมระบบจดจำโฟลเดอร์ (หากไม่มีค่าเดิมจะแสดงหน้าต่างให้เลือก Path ใหม่ทันที)
  • Quick Apply (ฟีเจอร์เดิม): ระบบเลือกและนำ View Template ไปใช้กับหลายๆ View พร้อมกันได้อย่างรวดเร็ว

author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "Manage, rename, duplicate, export, and quick apply View Templates. / จัดการ เปลี่ยนชื่อ ลบ ส่งออก และตั้งค่า View Templates แบบรวดเร็ว"