title:
  en_us: Spectrum

tooltip: |
  Spectrum: Advanced BIM Element Colorizer & Analyzer (Revit 2024-2026 Ready)
  
  [ENG]
  - Futuristic Dark UI: Modern and professional interface designed to reduce eye strain.
  - Smart Color Generation: Apply predefined palettes (Pastel, Vibrant, Dark, Earthy) or generate Gradient colors instantly.
  - Transparency Control: Adjust surface transparency (0-100%) for better visualization of complex MEP and Architectural models.
  - View Filters & Legends: Automatically generate View Filters and Legends directly from your applied color schemes.
  - Smart Memory: Save and load color schemes (.cschn, .csv) with auto-category detection and path memory.
  - Element Interaction: Shift+Click on a list item to instantly isolate and select elements in the model.
  
  [TH]
  - ระบบสร้างสีอัจฉริยะ: สุ่มสี ไล่สี (Gradient) หรือเลือกใช้ชุดสีสำเร็จรูป (Pastel, Vibrant, Dark, Earthy) ได้ในคลิกเดียว
  - ควบคุมความโปร่งใส (Transparency): ปรับความโปร่งใสของวัตถุ (0-100%) แบบเรียลไทม์ เพื่อช่วยตรวจสอบงานระบบที่ซ้อนทับกัน
  - สร้าง Legend & Filters: รองรับการสร้างตารางอธิบายสี และสร้าง View Filters อัตโนมัติ (อัปเดต API สมบูรณ์สำหรับ Revit 2026)
  - ระบบบันทึกอัจฉริยะ (Smart Load): บันทึกและโหลดชุดสี (.cschn, .csv) พร้อมระบบเลือก Category และ Parameter คืนค่าให้อัตโนมัติ
  - การจัดการวัตถุ: กด Shift+Click ที่รายการสีเพื่อเลือก (Select) วัตถุในโมเดลได้อย่างรวดเร็ว

