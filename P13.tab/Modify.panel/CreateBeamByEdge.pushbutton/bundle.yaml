title: "Beam\nBy Edge"

tooltip: |
  [ENG] Create 2-Point Adaptive Beams by selecting edges. Allows changing Profile 1 & 2 in Properties.
  [TH] สร้างคานแบบ Adaptive Component โดยการเลือกเส้นขอบ สามารถเปลี่ยน Profile หัว-ท้ายได้ที่หน้า Properties

description: |
  [ENG]
  1. Click 'Adaptive Beam By Edge'.
  2. If the family doesn't exist, the script will auto-generate 'P13_Adaptive_Beam'.
  3. Select edges and click 'Finish'.
  4. Select the beam in Revit to change Profile 1/2 in Properties.

  [TH]
  1. กดปุ่ม 'Adaptive Beam By Edge'
  2. หากยังไม่มี Family ระบบจะสร้าง 'P13_Adaptive_Beam' ให้โดยอัตโนมัติ
  3. เลือกเส้นขอบที่ต้องการแล้วกด 'Finish'
  4. คุณสามารถคลิกที่คานเพื่อเปลี่ยน Profile 1 และ 2 ได้ทันทีในแถบ Properties

