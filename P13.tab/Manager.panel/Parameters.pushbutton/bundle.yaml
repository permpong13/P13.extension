title: "G-Element\nStatus"

tooltip: |
  🇬🇧 [EN] Manage and update the "g_Element Status" parameter for elements in the active view (Revit 2026 Compatible).
  Key Features:
  • Smart Auto-Setup: Automatically detects, creates, and binds the Shared Parameter to over 60 categories if missing.
  • Workset Grouping: Organizes elements by Workset and their current status for precise tracking and updating.
  • Model Group Support: Auto-enables 'Varies Across Groups' to allow updating elements locked inside Model Groups.
  • UI Dashboard: Batch update statuses with Highlight selection, Apply to List, and a clear status legend (0 to 2).

  🇹🇭 [TH] จัดการและอัปเดตสถานะองค์ประกอบ (g_Element Status) ใน View ปัจจุบัน (รองรับ Revit 2026)
  ฟังก์ชันหลัก:
  • ระบบ Auto-Setup: ตรวจสอบ สร้าง และผูก Shared Parameter เข้ากับ Category กว่า 60 หมวดหมู่ให้อัตโนมัติหากยังไม่มีในโปรเจกต์
  • จัดกลุ่มข้อมูล (Workset Grouping): แสดงรายการแยกตาม Workset และสถานะปัจจุบัน เพื่อความแม่นยำในการเลือกอัปเดต
  • รองรับ Model Group: เปิดใช้งาน 'Varies Across Groups' ให้อัตโนมัติ เพื่อให้สามารถแก้ไขชิ้นงานที่อยู่ในกรุ๊ปได้
  • หน้าต่าง UI Dashboard: จัดการแบบกลุ่มอย่างรวดเร็วด้วยระบบ Select Highlight และมีคำอธิบายสถานะ (0-2) ไว้อย่างชัดเจน

author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "Manage 'g_Element Status' by Workset with auto-parameter setup. / จัดการและอัปเดตสถานะ g_Element Status แยกตาม Workset พร้อมระบบสร้าง Parameter อัตโนมัติ"