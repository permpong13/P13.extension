title: "Pipes Flow\nDirections"

tooltip: |
  🇬🇧 [EN] Generate pipe flow direction arrows using SMART Flow Detection (Rule-Based AI).
  Key Features:
  • SMART Detection: Analyzes Slope, Elevation, Connections (pumps/valves), MEP Systems, and Neighbor pipes to determine flow direction.
  • Confidence Score: Calculates and displays the probability of the detected direction.
  • Custom Spacing: Set arrow intervals in meters with automatic conversion and placement.
  • Flexible Selection: Choose any Detail Item family and type to serve as the flow arrow.
  • Auto-Rotation: Automatically aligns and rotates arrows to match the calculated flow path.

  🇹🇭 [TH] สร้างสัญลักษณ์ลูกศรบอกทิศทางการไหลด้วยระบบ SMART Flow Detection (Rule-Based AI)
  ฟังก์ชันหลัก:
  • SMART Detection: วิเคราะห์ทิศทางอย่างชาญฉลาดจาก Slope, ระดับความสูง, การเชื่อมต่ออุปกรณ์ (ปั๊ม/วาล์ว), ประเภทระบบท่อ และท่อข้างเคียง
  • คำนวณความมั่นใจ: แสดงเปอร์เซ็นต์ความน่าจะเป็นของทิศทางการไหลที่ตรวจพบ
  • กำหนดระยะอิสระ: ระบุระยะห่างระหว่างลูกศรเป็นหน่วยเมตร พร้อมระบบคำนวณและจัดวางอัตโนมัติ
  • เลือกสัญลักษณ์ได้: เลือกใช้ Detail Item Family และ Type ใดก็ได้ในโปรเจกต์มาเป็นลูกศร
  • หมุนลูกศรอัตโนมัติ: ปรับทิศทางและการหมุนของลูกศรให้ตรงตามแนวการไหลของท่อจริง

author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "Generate pipe flow arrows with rule-based SMART flow analysis and automatic placement. / สร้างลูกศรทิศทางการไหลของท่อด้วยระบบวิเคราะห์อัจฉริยะและการจัดวางอัตโนมัติ"