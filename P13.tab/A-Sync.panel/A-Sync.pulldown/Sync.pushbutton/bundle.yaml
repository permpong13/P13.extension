title: "Tags\nLegend"

tooltip: |
  🇬🇧 [EN] Tag Legend Components with custom parameter values (Revit 2024-2026 Compatible).
  Key Features:
  • Sync Mode: Update text values while keeping existing tag positions.

  🇹🇭 [TH] สร้างข้อความกำกับ (Tag) ให้กับ Legend Components โดยเลือกดึงค่าพารามิเตอร์ได้อิสระ (รองรับ Revit 2024-2026)
  ฟังก์ชันหลัก:
  • โหมดซิงค์ข้อมูล: อัปเดตเฉพาะเนื้อหาข้อความโดยยังคงรักษาตำแหน่งเดิมที่เคยจัดวางไว้

author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "Tag legend components with multi-parameter support and smart placement. / สร้างและอัปเดตแท็ก Legend ด้วยพารามิเตอร์ที่ต้องการพร้อมระบบจัดตำแหน่งอัจฉริยะ"