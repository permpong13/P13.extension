title: "S-Filter"

tooltip: |
  เครื่องมือสำหรับกรองและเลือกวัตถุ (Filter) ขั้นสูงใน Revit ที่ทำงานได้อย่างรวดเร็วและแม่นยำ
  
  ฟังก์ชันหลัก:
  • แสดงผลรายการวัตถุแบบลำดับชั้น (Tree View) แยกตาม Category > Family > Type
  • รองรับการค้นหาข้อมูลจากหลายแหล่ง (Current Selection, Visible in View, All Model)
  • มีช่องค้นหาอัจฉริยะ (Search) พิมพ์แล้วกด Enter เพื่อกรองทันที
  • ระบบ Memory: บันทึกและเรียกคืนชุดวัตถุที่เลือกบ่อยๆ ได้ตลอดเวลา
  • สามารถสั่ง ขยายการเลือกไปยัง Host, Level เดียวกัน หรือ Isolate/Hide วัตถุได้จากหน้าต่างทันที
  • รองรับการ Filter เจาะลึกด้วยค่า Parameter
  
  การใช้งาน:
  1. กดรันสคริปต์ S-Filter
  2. ค้นหาหรือเลือกวัตถุที่ต้องการจากรายการฝั่งซ้าย (กด Enter เพื่อค้นหา)
  3. ตั้งค่าการขยาย (Expand) หรือบันทึกความจำฝั่งขวา
  4. กดปุ่ม Select / Isolate / Hide ด้านล่างเพื่อทำงาน

author: "เพิ่มพงษ์ ทวีกุล (P13)"
description: "Advanced element filtering tool with hierarchical Tree View, real-time Search, and Memory feature for saving selections."